<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${titulo})}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
      <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/alunos}" class="btn btn-sm btn-light border">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h2 class="fw-bold mb-0" th:text="${titulo}"></h2>
          <p class="text-muted mb-0 small">Preencha os dados do aluno</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
            <input type="hidden" th:field="*{idAluno}">

            <div class="mb-3">
              <label for="nome" class="form-label fw-semibold">Nome Completo <span class="text-danger">*</span></label>
              <input type="text" th:field="*{nome}" id="nome" class="form-control"
                     th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                     placeholder="Ex: João da Silva">
              <div class="invalid-feedback" th:errors="*{nome}"></div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="email" class="form-label fw-semibold">E-mail <span class="text-danger">*</span></label>
                <input type="email" th:field="*{email}" id="email" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                       placeholder="joao@exemplo.com">
                <div class="invalid-feedback" th:errors="*{email}"></div>
              </div>
              <div class="col-md-6 mb-3">
                <label for="matricula" class="form-label fw-semibold">Matrícula <span class="text-danger">*</span></label>
                <input type="text" th:field="*{matricula}" id="matricula" class="form-control"
                       th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid' : ''"
                       placeholder="Ex: RM001001">
                <div class="invalid-feedback" th:errors="*{matricula}"></div>
              </div>
            </div>

            <div class="mb-4">
              <label for="idCurso" class="form-label fw-semibold">Curso <span class="text-danger">*</span></label>
              <select name="idCurso" id="idCurso" class="form-select" required>
                <option value="">— Selecione um curso —</option>
                <option th:each="c : ${cursos}"
                        th:value="${c.idCurso}"
                        th:text="${c.nome}"
                        th:selected="${aluno.curso != null and aluno.curso.idCurso == c.idCurso}">
                </option>
              </select>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success px-4">
                <i class="bi bi-check-lg me-1"></i>Salvar
              </button>
              <a th:href="@{/alunos}" class="btn btn-light border">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
