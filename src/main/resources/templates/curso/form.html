<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${titulo})}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5 flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/cursos}" class="btn btn-sm btn-light border">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h2 class="fw-bold mb-0" th:text="${titulo}"></h2>
          <p class="text-muted mb-0 small">Preencha os dados do curso</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form th:action="@{/cursos/salvar}" th:object="${curso}" method="post">
            <input type="hidden" th:field="*{idCurso}">

            <div class="mb-3">
              <label for="nome" class="form-label fw-semibold">Nome do Curso <span class="text-danger">*</span></label>
              <input type="text" th:field="*{nome}" id="nome" class="form-control"
                     th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                     placeholder="Ex: Análise e Desenvolvimento de Sistemas">
              <div class="invalid-feedback" th:errors="*{nome}"></div>
            </div>

            <div class="mb-3">
              <label for="descricao" class="form-label fw-semibold">Descrição</label>
              <textarea th:field="*{descricao}" id="descricao" class="form-control" rows="3"
                        placeholder="Descreva o curso..."></textarea>
            </div>

            <div class="mb-4">
              <label for="cargaHoraria" class="form-label fw-semibold">Carga Horária (h) <span class="text-danger">*</span></label>
              <input type="number" th:field="*{cargaHoraria}" id="cargaHoraria" class="form-control"
                     th:classappend="${#fields.hasErrors('cargaHoraria')} ? 'is-invalid' : ''"
                     placeholder="Ex: 2000" min="1">
              <div class="invalid-feedback" th:errors="*{cargaHoraria}"></div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i>Salvar
              </button>
              <a th:href="@{/cursos}" class="btn btn-light border">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
