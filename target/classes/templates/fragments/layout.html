<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' | Escola API'">Escola API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">
      <i class="bi bi-mortarboard-fill me-2"></i>Escola API
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">

        <li class="nav-item">
          <a class="nav-link" th:href="@{/}"
             th:classappend="${activeMenu == 'home'} ? 'active'">
            <i class="bi bi-house me-1"></i>Início
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/cursos}"
             th:classappend="${activeMenu == 'cursos'} ? 'active'">
            <i class="bi bi-journal-bookmark me-1"></i>Cursos
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/alunos}"
             th:classappend="${activeMenu == 'alunos'} ? 'active'">
            <i class="bi bi-people me-1"></i>Alunos
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<footer th:fragment="footer" class="footer py-3 mt-auto">
  <div class="container text-center">
    <small class="text-muted">
      <i class="bi bi-cloud-fill text-primary me-1"></i>
      Escola API &mdash; Hospedado no <strong>Azure App Service</strong> com <strong>SQL Server PaaS</strong>
    </small>
  </div>
</footer>

<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
